<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <g id="university">

    <!-- Left flanking building -->
    <g id="bldg-left">
      <!-- Pitched roof -->
      <polygon points="60,210 160,210 150,180 70,180" fill="#c44d4d"/>
      <polygon points="70,180 150,180 110,150" fill="#c44d4d"/>
      <!-- Body -->
      <rect x="65" y="210" width="90" height="110" fill="#d4d4d4"/>
      <!-- Trim base -->
      <rect x="60" y="315" width="100" height="8" fill="#f4efe6"/>
      <!-- Windows -->
      <rect x="75" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="102" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="129" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="75" y="260" width="15" height="22" fill="#4a90b8"/>
      <rect x="102" y="260" width="15" height="22" fill="#4a90b8"/>
      <rect x="129" y="260" width="15" height="22" fill="#4a90b8"/>
      <!-- Door -->
      <rect x="102" y="293" width="15" height="27" fill="#4a90b8"/>
    </g>

    <!-- Bell tower (small, behind/between left and main) -->
    <g id="bldg-tower">
      <!-- Shaft -->
      <rect x="175" y="155" width="40" height="165" fill="#d4d4d4"/>
      <!-- Trim cap -->
      <rect x="170" y="150" width="50" height="8" fill="#f4efe6"/>
      <!-- Belfry opening -->
      <rect x="187" y="170" width="16" height="24" fill="#4a90b8"/>
      <!-- Small windows -->
      <rect x="187" y="215" width="16" height="20" fill="#4a90b8"/>
      <rect x="187" y="250" width="16" height="20" fill="#4a90b8"/>
      <!-- Roof -->
      <polygon points="170,150 220,150 195,115" fill="#c44d4d"/>
      <!-- Finial -->
      <rect x="193" y="100" width="4" height="15" fill="#f4efe6"/>
      <circle cx="195" cy="98" r="3" fill="#e7c66a"/>
    </g>

    <!-- Main central building -->
    <g id="bldg-main">
      <!-- Main body -->
      <rect x="230" y="180" width="210" height="140" fill="#d4d4d4"/>
      <!-- Base trim -->
      <rect x="225" y="315" width="220" height="8" fill="#f4efe6"/>
      <!-- Entablature (trim above columns) -->
      <rect x="235" y="175" width="200" height="12" fill="#f4efe6"/>
      <!-- Triangular pediment -->
      <polygon points="235,175 435,175 335,125" fill="#c44d4d"/>
      <!-- Pediment inner trim -->
      <polygon points="250,172 420,172 335,135" fill="#f4efe6"/>
      <polygon points="260,170 410,170 335,142" fill="#c44d4d"/>

      <!-- Columns (6) -->
      <rect x="248" y="190" width="12" height="120" fill="#f4efe6"/>
      <rect x="278" y="190" width="12" height="120" fill="#f4efe6"/>
      <rect x="308" y="190" width="12" height="120" fill="#f4efe6"/>
      <rect x="350" y="190" width="12" height="120" fill="#f4efe6"/>
      <rect x="380" y="190" width="12" height="120" fill="#f4efe6"/>
      <rect x="410" y="190" width="12" height="120" fill="#f4efe6"/>

      <!-- Column capitals -->
      <rect x="245" y="187" width="18" height="5" fill="#f4efe6"/>
      <rect x="275" y="187" width="18" height="5" fill="#f4efe6"/>
      <rect x="305" y="187" width="18" height="5" fill="#f4efe6"/>
      <rect x="347" y="187" width="18" height="5" fill="#f4efe6"/>
      <rect x="377" y="187" width="18" height="5" fill="#f4efe6"/>
      <rect x="407" y="187" width="18" height="5" fill="#f4efe6"/>

      <!-- Central doorway between middle columns -->
      <rect x="325" y="255" width="20" height="55" fill="#4a90b8"/>
      <path d="M 325 255 Q 335 245 345 255 Z" fill="#4a90b8"/>

      <!-- Dome with clock on top -->
      <rect x="310" y="115" width="50" height="12" fill="#f4efe6"/>
      <path d="M 310 115 Q 335 75 360 115 Z" fill="#e7c66a"/>
      <circle cx="335" cy="95" r="10" fill="#e7c66a" stroke="#1a1a1a" stroke-width="1"/>
      <!-- Clock hands -->
      <path d="M 335 95 L 335 89" stroke="#1a1a1a" stroke-width="1" fill="none"/>
      <path d="M 335 95 L 340 97" stroke="#1a1a1a" stroke-width="1" fill="none"/>
      <!-- Finial on dome -->
      <rect x="333" y="65" width="4" height="12" fill="#f4efe6"/>
    </g>

    <!-- Right flanking building -->
    <g id="bldg-right">
      <!-- Pitched roof -->
      <polygon points="455,210 555,210 545,180 465,180" fill="#c44d4d"/>
      <polygon points="465,180 545,180 505,150" fill="#c44d4d"/>
      <!-- Body -->
      <rect x="460" y="210" width="90" height="110" fill="#d4d4d4"/>
      <!-- Trim base -->
      <rect x="455" y="315" width="100" height="8" fill="#f4efe6"/>
      <!-- Windows -->
      <rect x="470" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="497" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="524" y="225" width="15" height="22" fill="#4a90b8"/>
      <rect x="470" y="260" width="15" height="22" fill="#4a90b8"/>
      <rect x="497" y="260" width="15" height="22" fill="#4a90b8"/>
      <rect x="524" y="260" width="15" height="22" fill="#4a90b8"/>
      <!-- Door -->
      <rect x="497" y="293" width="15" height="27" fill="#4a90b8"/>
    </g>

    <!-- Ground line -->
    <path d="M 30 323 L 570 323" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>

  </g>
</svg>
